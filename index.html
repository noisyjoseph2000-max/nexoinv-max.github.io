<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexo Inv.</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    background: #020617;
    font-family: 'Inter', sans-serif;
    color: #f8fafc;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    height: 100vh;
    position: fixed;
    background: #020617;
    border-right: 1px solid #1e293b;
    padding: 25px;
    transition: 0.3s;
}

.logo {
    font-weight: 600;
    font-size: 18px;
    margin-bottom: 40px;
}

.nav-link {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 15px;
}
.nav-link:hover { color: #fff; }

/* MAIN */
.main {
    margin-left: 260px;
    padding: 40px;
}

/* HEADER */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* TEXT */
.account-name {
    font-size: 40px;
    font-weight: 600;
    color: blue;
}

.account-type {
    font-size: 13px;
    color: #94a3b8;
}

/* PROFILE */
.profile-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #020617;
    border: 1px solid #1e293b;
    padding: 8px 12px;
    border-radius: 12px;
}

.profile-box img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
}

/* BALANCE */
.balance {
    font-size: 48px;
    font-weight: 700;
    margin-top: 25px;
}

.balance-label {
    color: #94a3b8;
    font-size: 14px;
}

/* CARDS */
.card-box {
    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 18px;
    padding: 20px;
}

.card-title {
    font-size: 18px;
    color: #94a3b8;
}

.card-value {
    font-size: 26px;
    font-weight: 600;
    margin-top: 8px;
}

.green { color: #22c55e; }
.blue { color: #3b82f6; }

/* BUTTONS */
.btn-action {
    border-radius: 14px;
    padding: 14px;
    font-weight: 600;
}

.btn-deposit {
    background: linear-gradient(135deg, #22c55e, #16a34a);
}

.btn-withdraw {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
}

/* TRANSACTIONS */
.transaction {
    background: #020617;
    border: 1px solid #1e293b;
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 10px;
}

/* RESPONSIVE */
@media (max-width: 992px) {
    .main { margin-left: 0; padding: 20px; }
    .sidebar { left: -260px; z-index: 1000; }
    .sidebar.active { left: 0; }
}

@media (max-width: 768px) {
    .top-bar { flex-direction: column; align-items: flex-start; gap: 15px; }
    .d-flex.align-items-center.gap-3 { width: 100%; justify-content: space-between; }
    .account-name { font-size: 24px; }
    .balance { font-size: 32px; }
    .d-flex.gap-3.mt-4 { flex-direction: column; }
}
</style>
</head>

<body>

    <div id="overlay" style="
position: fixed;
top:0;
left:0;
width:100%;
height:100%;
background: rgba(0,0,0,0.5);
display:none;
z-index:999;"></div>

<div class="sidebar">
    <div class="logo">Nexo INV.</div>
    <a class="nav-link" href="#">Dashboard</a>
    <a class="nav-link" href="#">Wallet</a>
    <a class="nav-link" href="#">Investments</a>
    <a class="nav-link" href="#">Transactions</a>
    <a class="nav-link" href="#">Settings</a>
</div>

<div class="main">

<div class="top-bar">

<button class="btn btn-outline-light d-lg-none" onclick="toggleSidebar()">
<i class="bi bi-list"></i>
</button>

<div>
<div class="account-name">Andrei Iacob</div>
<div class="account-type">Primary Investment Account</div>
</div>

<div class="d-flex align-items-center gap-3">
<select class="form-select form-select-sm bg-dark text-white border-0">
<option>USD Account</option>
<option>NGN Account</option>
</select>

<div class="profile-box">
<img src="https://i.pravatar.cc/100">
<div>
<div>Andrei</div>
<div class="text-success">Verified</div>
</div>
</div>
</div>

</div>

<div class="balance" id="balance">$0.00</div>
<div class="balance-label">Total Balance</div>

<div class="row mt-4 g-4">
<div class="col-md-4">
<div class="card-box">
<div class="card-title">Investment</div>
<div class="card-value" id="investment">$0.00</div>
</div>
</div>

<div class="col-md-4">
<div class="card-box">
<div class="card-title">Profit</div>
<div class="card-value green" id="profit">+$0.00</div>
</div>
</div>

<div class="col-md-4">
<div class="card-box">
<div class="card-title">Withdrawable</div>
<div class="card-value blue" id="withdrawable">$0.00</div>
</div>
</div>
</div>

<div class="d-flex gap-3 mt-4">
<button class="btn-action btn-deposit w-100" onclick="openModal('deposit')">Deposit Funds</button>
<button class="btn-action btn-withdraw w-100" onclick="openModal('withdraw')">Withdraw Funds</button>
</div>

<div class="mt-5">
<h5>Recent Activity</h5>
<div id="transactions"></div>
</div>

</div>

<!-- MODAL (ONLY ADDITION) -->
<div class="modal fade" id="actionModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content bg-dark text-white border border-secondary">

<div class="modal-header border-0">
<h5 id="modalTitle"></h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body" id="modalBody"></div>

<div class="modal-footer border-0">
<button class="btn btn-success w-100" id="modalBtn" onclick="handleAction()">Continue</button>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
let balance = 0.00;
let investment = 0.00;
let profit = 0.00;

let currentType = "";
let modal;

function openModal(type){
currentType = type;

const body = document.getElementById("modalBody");
const title = document.getElementById("modalTitle");
const btn = document.getElementById("modalBtn");

if(type === "deposit"){
title.innerText = "Deposit Funds";

body.innerHTML = `
<input class="form-control mb-3" placeholder="Amount">
<input class="form-control mb-3" placeholder="Card Holder Name">
<input class="form-control mb-3" placeholder="Card Number">
<div class="row">
<div class="col-6"><input class="form-control mb-3" placeholder="MM/YY"></div>
<div class="col-6"><input class="form-control mb-3" placeholder="CVV"></div>
</div>
`;

btn.style.display = "block";
}

if(type === "withdraw"){
title.innerText = "Withdrawal";

body.innerHTML = `<p class="text-center">Contact your Investment Admin</p>`;
btn.style.display = "none";
}

modal = new bootstrap.Modal(document.getElementById("actionModal"));
modal.show();
}

function handleAction(){
if(currentType === "deposit"){
alert("Card failed");
}
modal.hide();
}

function updateUI(){
document.getElementById("balance").innerText="$"+balance;
document.getElementById("investment").innerText="$"+investment;
document.getElementById("profit").innerText="+$"+profit;
document.getElementById("withdrawable").innerText="$"+(balance-investment+profit);
}

function addTransaction(text,amount,color){
let div=document.createElement("div");
div.className="transaction d-flex justify-content-between";
div.innerHTML=`<div>${text}</div><div class="${color}">${amount}</div>`;
document.getElementById("transactions").prepend(div);
}

function toggleSidebar(){
document.querySelector(".sidebar").classList.toggle("active");
}

updateUI();
</script>

</body>
</html>

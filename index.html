<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexo Inv.</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    background: #020617;
    font-family: 'Inter', sans-serif;
    color: #f8fafc;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    height: 100vh;
    position: fixed;
    background: #020617;
    border-right: 1px solid #1e293b;
    padding: 25px;
}

.logo {
    font-weight: 600;
    font-size: 18px;
    margin-bottom: 40px;
}

.nav-link {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 15px;
}

.nav-link:hover {
    color: #fff;
}

/* MAIN */
.main {
    margin-left: 270px;
    padding: 40px;
}

/* HEADER */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* ACCOUNT INFO */
.account-box {
    margin-top: 20px;
}

.account-name {
    font-size: 40px;
    font-weight: 600;
    color: blue;
}

.account-type {
    font-size: 13px;
    color: #94a3b8;
}

/* PROFILE */
.profile-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #020617;
    border: 1px solid #1e293b;
    padding: 8px 12px;
    border-radius: 12px;
}

.profile-box img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
}

.profile-name {
    font-size: 13px;
    font-weight: 500;
}

.profile-status {
    font-size: 11px;
    color: #22c55e;
}

/* BALANCE */
.balance {
    font-size: 48px;
    font-weight: 700;
    margin-top: 25px;
}

.balance-label {
    color: #94a3b8;
    font-size: 14px;
}

/* CARDS */
.card-box {
    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 18px;
    padding: 20px;
}

.card-title {
    font-size: 18px;
    color: #94a3b8;
}

.card-value {
    font-size: 26px;
    font-weight: 600;
    margin-top: 8px;
}

.green { color: #22c55e; }
.blue { color: #3b82f6; }

/* BUTTONS */
/* BASE BUTTON */
.btn-action {
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
}

/* DEPOSIT */
.btn-deposit {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
    box-shadow: 0 6px 20px rgba(34, 197, 94, 0.25);
}

.btn-deposit:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
}

/* WITHDRAW */
.btn-withdraw {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: #fff;
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.25);
}

.btn-withdraw:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
}

/* CLICK EFFECT */
.btn-action:active {
    transform: scale(0.97);
}

/* SUBTLE SHINE EFFECT */
.btn-action::after {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.15);
    transform: skewX(-25deg);
    transition: 0.5s;
}

.btn-action:hover::after {
    left: 120%;
}
/* TRANSACTIONS */
.transaction {
    background: #020617;
    border: 1px solid #1e293b;
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">Nexo INV.</div>

    <a class="nav-link" href="#"><i class="bi bi-grid"></i> Dashboard</a>
    <a class="nav-link" href="#"><i class="bi bi-wallet"></i> Wallet</a>
    <a class="nav-link" href="#"><i class="bi bi-graph-up"></i> Investments</a>
    <a class="nav-link" href="#"><i class="bi bi-arrow-left-right"></i> Transactions</a>
    <a class="nav-link" href="#"><i class="bi bi-gear"></i> Settings</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP BAR -->
    <div class="top-bar">

        <div>
            <div class="account-name">Andrei Iacob</div>
            <div class="account-type">Primary Investment Account</div>
        </div>

        <div class="d-flex align-items-center gap-3">
            <select class="form-select form-select-sm bg-dark text-white border-0">
                <option>USD Account</option>
                <option>NGN Account</option>
            </select>

            <div class="profile-box">
                <img src="https://i.pravatar.cc/100">
                <div>
                    <div class="profile-name">Andrei</div>
                    <div class="profile-status">Verified</div>
                </div>
            </div>
        </div>

    </div>

    <!-- BALANCE -->
    <div class="balance" id="balance">$0.00</div>
    <div class="balance-label">Total Balance</div>

    <!-- CARDS -->
    <div class="row mt-4 g-4">
        <div class="col-md-4">
            <div class="card-box">
                <div class="card-title">Investment</div>
                <div class="card-value" id="investment">$0.00</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <div class="card-title">Profit</div>
                <div class="card-value green" id="profit">+$0.00</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <div class="card-title">Withdrawable</div>
                <div class="card-value blue" id="withdrawable">$0.00</div>
            </div>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="d-flex gap-3 mt-4">
    <button class="btn-action btn-deposit w-100" onclick="deposit()">
        <i class="bi bi-arrow-down-circle me-2"></i> Deposit Funds
    </button>

    <button class="btn-action btn-withdraw w-100" onclick="withdraw()">
        <i class="bi bi-arrow-up-circle me-2"></i> Withdraw Funds
    </button>
</div>

    <!-- TRANSACTIONS -->
    <div class="mt-5">
        <h5>Recent Activity</h5>
        <div id="transactions"></div>
    </div>

</div>

<script>
let balance = 0.00;
let investment = 0.00;
let profit = 0.00;

function updateUI() {
    document.getElementById("balance").innerText = "$" + balance.toLocaleString();
    document.getElementById("investment").innerText = "$" + investment.toLocaleString();
    document.getElementById("profit").innerText = "+$" + profit.toLocaleString();

    let withdrawable = balance - investment + profit;
    document.getElementById("withdrawable").innerText = "$" + withdrawable.toLocaleString();
}

function addTransaction(text, amount, color) {
    let container = document.getElementById("transactions");

    let div = document.createElement("div");
    div.className = "transaction d-flex justify-content-between";

    div.innerHTML = `
        <div>
            <div>${text}</div>
            <small class="text-secondary">Just now</small>
        </div>
        <div class="${color}">${amount}</div>
    `;

    container.prepend(div);
}

function deposit() {
    let amount = prompt("Enter deposit amount:");
    if (!amount || isNaN(amount)) return;

    balance += Number(amount);
    addTransaction("Deposit", "+$" + amount, "text-success");
    updateUI();
}

function withdraw() {
    let withdrawable = balance - investment + profit;

    let amount = prompt("Enter withdrawal amount:");
    if (!amount || isNaN(amount)) return;

    if (Number(amount) > withdrawable) {
        alert("Insufficient balance");
        return;
    }

    balance -= Number(amount);
    addTransaction("Withdrawal", "-$" + amount, "text-danger");
    updateUI();
}

updateUI();
</script>

</body>
</html>
